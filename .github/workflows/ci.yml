name: Deploy Jekyll site

on:
  push:
    branches:
      - main  # Adjust based on your default branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1' # Ensure compatibility with GitHub Pages
          bundler-cache: true

      - name: Install dependencies
        run: |
          cd docs  # Navigate to the docs directory
          bundle install --path vendor/bundle

      - name: Build Jekyll site
        run: |
          cd docs  # Ensure build happens in the correct folder
          bundle exec jekyll build --destination ../_site # Output outside docs/
