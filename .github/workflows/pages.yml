name: GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
  
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3'
          bundler-cache: true
          cachce-version: 0

      - name: Install correct Bundler version
        run: gem install bundler:2.5.9

      - name: Set Gemfile path
        run: echo "BUNDLE_GEMFILE=${{ github.workspace }}/docs/Gemfile" >> $GITHUB_ENV

      - name: Install Jekyll version 4.4.1
        run: gem install jekyll -v 4.4.1
        
      - name: Install Jekyll version 4.3.2
        run: gem install jekyll -v 4.3.2

      - name: Install dependencies
        working-directory: docs
        run: bundle install --jobs 4 --retry 3

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        working-directory: docs
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: docs/_site

  # deploy:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Download artifact
  #       uses: actions/download-artifact@v4
  #       with:
  #         name: github-pages

  #     - name: Deploy to GitHub Pages
  #       id: deploy-pages
  #       uses: actions/deploy-pages@v4
  #       with:
  #         token: ${{ secrets.GITHUB_TOKEN }}


  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4